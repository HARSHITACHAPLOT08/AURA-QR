services:
  - type: web
    name: aura-api
    runtime: python
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: uvicorn backend.api:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: PORT
        value: 10000
